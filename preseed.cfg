### Debian Preseed Configuration
### Auto-unattended install — only asks the user key questions,
### then runs fully hands-off through the rest of the installation.

### To make this preseed run on a debian iso USB, go to boot-grub-grub.cfg and add the following to the 
### end of line that says "linux /vmlinuz ...". There should be 2 lines (one for graphical install and one for text install)
### file=/cdrom/preseed.cfg auto=true

#============================================================================
# 1. LANGUAGE / LOCALE  (hardcoded — English, Canada)
#============================================================================
d-i debian-installer/language string en
d-i debian-installer/country string CA
d-i debian-installer/locale string en_CA.UTF-8
# Skip additional locale generation prompt
d-i localechooser/supported-locales multiselect en_CA.UTF-8, en_US.UTF-8

#============================================================================
# 2. KEYBOARD  (hardcoded — US English)
#============================================================================
d-i keyboard-configuration/xkb-keymap select us

#============================================================================
# 3. NETWORK  (interactive — wifi credentials if needed)
#============================================================================
# WiFi credentials left interactive if no ethernet.
# Hostname, domain hardcoded.
d-i netcfg/get_hostname string debian
d-i netcfg/get_domain string local

#============================================================================
# 4. ROOT ACCOUNT  (interactive — disabled by default)
#============================================================================
# The installer will ask whether to enable root.
# Default: root disabled (user gets sudo instead).
d-i passwd/root-login boolean false

#============================================================================
# 5. USER ACCOUNT  (hardcoded — user/user/1)
#============================================================================
d-i passwd/user-fullname string user
d-i passwd/username string user
d-i passwd/user-password password 1
d-i passwd/user-password-again password 1
d-i user-setup/allow-password-weak boolean true

#============================================================================
# 6. CLOCK / TIMEZONE  (auto from location selection)
#============================================================================
d-i clock-setup/utc boolean true
# Hardcoded to Eastern timezone — no prompt
d-i time/zone string America/Toronto
d-i clock-setup/ntp boolean true

#============================================================================
# 7. PARTITIONING  (interactive — user picks disk and method)
#============================================================================
# Left interactive so the user gets to:
#   - Choose "use largest free space" or "use entire disk"
#   - Select which disk (installer shows model + size + device path)
#
# We only pre-answer the partition recipe (all files in one partition)
# and the final "write changes" confirmations so the user doesnt have
# to click through those extra screens after making their choice.
d-i partman-auto/choose_recipe select atomic

# Auto-confirm the "write changes to disk" prompts after user picks their disk
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# For UEFI systems — dont prompt about missing EFI partition
d-i partman-efi/non_efi_system boolean true

#============================================================================
# 8. PACKAGE MANAGER / MIRROR  (auto — deb.debian.org)
#============================================================================
# Mirror country defaults to the country the user picked earlier.
# The user can change it if prompted. We pre-select deb.debian.org.
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Contrib, non-free, and non-free-firmware enabled from the start
d-i apt-setup/contrib boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/non-free-firmware boolean true

# Skip "scan extra installation media" prompt — just say no
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/cdrom/set-next boolean false
d-i apt-setup/cdrom/set-failed boolean false

# Always use network mirror — dont ask
d-i apt-setup/use_mirror boolean true

#============================================================================
# 9. PACKAGE USAGE SURVEY — automatically decline (point #14)
#============================================================================
popularity-contest popularity-contest/participate boolean false

#============================================================================
# 10. DESKTOP ENVIRONMENT  (interactive — user picks one)
#============================================================================
# Hardcoded to KDE Plasma + standard utilities — skips the DE selection screen
tasksel tasksel/first multiselect standard system utilities, kde-desktop

#============================================================================
# 11. GRUB BOOT LOADER — auto-install to primary drive (point #16)
#============================================================================
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
# Auto-detect and install to the primary disk
d-i grub-installer/bootdev string default

#============================================================================
# 12. FINISH — auto-reboot when done (point #17)
#============================================================================
d-i finish-install/reboot_in_progress note
# Don't show the "installation complete" message — just reboot
d-i debian-installer/exit/halt boolean false

#============================================================================
# 13. POST-INSTALL — run setup.sh on first boot
#============================================================================
# Copy setup.sh to the new system and set up everything needed for
# a fully hands-free first boot: autologin, passwordless sudo,
# no KDE welcome screen, and an autostart entry that opens a terminal
# running the script. The script deletes these when done.
d-i preseed/late_command string \
    cp /cdrom/setup.sh /target/opt/setup.sh; \
    chmod +x /target/opt/setup.sh; \
    mkdir -p /target/etc/sddm.conf.d; \
    printf '[Autologin]\nUser=user\nSession=plasma\n' > /target/etc/sddm.conf.d/autologin.conf; \
    printf 'user ALL=(ALL:ALL) NOPASSWD: ALL\n' > /target/etc/sudoers.d/nopasswd; \
    chmod 0440 /target/etc/sudoers.d/nopasswd; \
    mkdir -p /target/etc/xdg; \
    printf '[General]\nfirstLoginActionsPerformed=true\n' > /target/etc/xdg/plasma-welcomerc; \
    mkdir -p /target/etc/xdg/autostart; \
    echo '[Desktop Entry]'                                  > /target/etc/xdg/autostart/debian-setup.desktop; \
    echo 'Type=Application'                                >> /target/etc/xdg/autostart/debian-setup.desktop; \
    echo 'Name=Debian First-Boot Setup'                    >> /target/etc/xdg/autostart/debian-setup.desktop; \
    echo 'Comment=One-time post-install configuration'     >> /target/etc/xdg/autostart/debian-setup.desktop; \
    echo 'Exec=x-terminal-emulator -e sudo bash /opt/setup.sh' >> /target/etc/xdg/autostart/debian-setup.desktop; \
    echo 'X-GNOME-Autostart-enabled=true'                  >> /target/etc/xdg/autostart/debian-setup.desktop
